joy_node:
  ros__parameters:
    deadzone: 0.1
    autorepeat_rate: 20.0
    dev: /dev/input/ps4

teleop_twist_joy:
  ros__parameters:
    axis_linear:
      x: 1
    scale_linear:
      x: 0.4
    scale_linear_turbo:
      x: 2.0
    axis_angular:
      yaw: 0
    scale_angular:
      yaw: 1.4
    scale_angular_turbo:
      yaw: 1.4
    enable_button: 4
    enable_turbo_button: 5
