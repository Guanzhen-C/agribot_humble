/**:
  ros__parameters:
    can_interface: can0
    command_topic: /hardware/cmd_vel
    odom_topic: /wheel/odometry
    odom_frame: wheel_odom
    base_frame: base_link

    send_rate_hz: 20.0
    command_timeout_sec: 0.25
    feedback_timeout_sec: 0.6
    require_feedback_before_motion: true
    require_autonomous_mode: false
    headlight: false

    wheelbase_m: 0.50
    max_steering_angle_rad: 0.384
    max_linear_velocity: 0.80
    max_angular_velocity: 0.65
    minimum_motion_speed: 0.02

    # WHEELTEC C50C SocketCAN protocol verified on the RDK X5 at 1 Mbit/s.
    command_id: 0x181
    feedback_part1_id: 0x101
    feedback_part2_id: 0x102
    feedback_part3_id: 0x103
