vehicle_collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    cmd_vel_in_topic: /nav2/cmd_vel
    cmd_vel_out_topic: /nav2/cmd_vel_safe
    transform_tolerance: 0.3
    source_timeout: 0.3
    base_shift_correction: false
    stop_pub_timeout: 1.0
    polygons: [stop_zone, slowdown_zone]
    stop_zone:
      type: polygon
      points: [1.0, 0.65, 1.0, -0.65, -0.35, -0.65, -0.35, 0.65]
      action_type: stop
      max_points: 3
      visualize: true
      polygon_pub_topic: /collision_monitor/stop_zone
      enabled: true
    slowdown_zone:
      type: polygon
      points: [1.8, 0.9, 1.8, -0.9, -0.4, -0.9, -0.4, 0.9]
      action_type: slowdown
      max_points: 3
      slowdown_ratio: 0.45
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_zone
      enabled: true
    observation_sources: [scan]
    scan:
      type: scan
      topic: /scan
      enabled: true
