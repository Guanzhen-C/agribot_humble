lslidar_driver_node:
  ros__parameters:
    lidar_type: CX
    device_ip: 192.168.1.200
    msop_port: 2368
    difop_port: 2369
    packet_rate: 1695.0
    add_multicast: false
    group_ip: 224.1.1.2

    pcl_type: false
    frame_id: lidar_link
    pointcloud_topic: /lidar/points
    use_time_service: false
    use_first_point_time: false
    use_absolute_time: false
    min_range: 0.3
    max_range: 100.0
    angle_disable_min: 0
    angle_disable_max: 0
    horizontal_angle_resolution: 0.18
    publish_scan: true
    scan_num: 8
    filter_angle_file: config/filter_angle.yaml

    is_pretreatment: false
    x_offset: 0.0
    y_offset: 0.0
    z_offset: 0.0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    is_MatrixTransformation: false
