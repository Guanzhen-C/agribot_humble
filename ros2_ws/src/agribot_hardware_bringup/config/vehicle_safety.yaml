vehicle_preflight:
  ros__parameters:
    sensor_timeout_sec: 1.0
    localization_timeout_sec: 2.0
    chassis_timeout_sec: 1.0
    accepted_rtk_qualities: [4, 5]

vehicle_command_gate:
  ros__parameters:
    input_topic: /nav2/cmd_vel_safe
    output_topic: /hardware/cmd_vel
    preflight_topic: /hardware/preflight_ready
    e_stop_topic: /safety/e_stop
    drive_enable_topic: /safety/drive_enable
    require_preflight: true
    input_timeout_sec: 0.30
    publish_rate: 20.0
    max_linear_velocity: 0.80
    max_angular_velocity: 0.65
