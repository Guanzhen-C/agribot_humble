rtk_nmea:
  ros__parameters:
    serial_port: /dev/ttyUSB0
    baud_rate: 115200
    frame_id: rtk_link
    fix_topic: /rtk/fix
    quality_topic: /rtk/fix_quality
    reconnect_interval_sec: 1.0
    fixed_horizontal_std_m: 0.03
    float_horizontal_std_m: 0.30
    autonomous_horizontal_std_m: 2.0
    vertical_std_scale: 1.5
    enable_ntrip: false
    ntrip_host: ""
    ntrip_port: 8002
    ntrip_mountpoint: ""
    ntrip_username: ""
    ntrip_password: ""
    ntrip_gga_period_sec: 5.0
