/**:
  ros__parameters:
    chassis_type: differential
    can_interface: can0
    command_topic: /hardware/cmd_vel
    odom_topic: /wheel/odometry
    odom_frame: wheel_odom
    base_frame: base_link

    # Excel specifies a 200 ms cycle and recommends 100-300 ms. The proven
    # legacy implementation used 100 ms, so the default remains 10 Hz.
    send_rate_hz: 10.0
    command_timeout_sec: 0.25
    feedback_timeout_sec: 1.2
    require_feedback_before_motion: true
    require_autonomous_mode: true

    # The proven tracked-vehicle implementation used byte0=0x03 for braking,
    # although byte0 is not described in the supplied Excel workbook.
    legacy_brake_byte: true
    invert_left_motor: false
    invert_right_motor: false
    headlight: false

    track_width_m: 0.94
    wheel_diameter_m: 0.20
    reduction_ratio: 30.0
    max_motor_rpm: 3000.0
    max_linear_velocity: 0.80
    max_angular_velocity: 1.4

    # Reference Ackermann layout. Real output is rejected unless the explicit
    # confirmation switch is set after checking the controller specification.
    wheelbase_m: 0.65
    max_steering_angle_rad: 0.60
    ackermann_max_yaw_rate: 0.65
    minimum_motion_speed: 0.02
    ackermann_command_id: 0x515
    ackermann_state_id: 0x535
    allow_unverified_ackermann_protocol: false
