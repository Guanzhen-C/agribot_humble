name: ROS 2 Humble

on:
  push:
  pull_request:

jobs:
  build-humble:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apt-get update && apt-get install -y libasio-dev python3-colcon-common-extensions python3-rosdep
      - name: Create colcon workspace
        run: mkdir -p /ros2_ws/src && ln -s "${GITHUB_WORKSPACE}" /ros2_ws/src/ugv_sdk
      - name: Install ROS dependencies
        run: cd /ros2_ws && rosdep install --from-paths src --ignore-src -y --rosdistro humble
      - name: Build and test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd /ros2_ws
          colcon build --packages-select ugv_sdk --cmake-args -DCMAKE_BUILD_TYPE=Release
          colcon test --packages-select ugv_sdk
          colcon test-result --verbose
