/**:
  ros__parameters:
    feature_extract_enable: false
    point_filter_num: 2
    max_iteration: 3
    filter_size_surf: 0.3
    filter_size_map: 0.3
    cube_side_length: 500.0
    runtime_pos_log_enable: false
    map_file_path: "./fastlio_sim.pcd"

    common:
      lid_topic: "/points"
      imu_topic: "/imu/data"
      time_sync_en: false
      time_offset_lidar_to_imu: 0.0

    preprocess:
      lidar_type: 2
      scan_line: 16
      scan_rate: 5
      timestamp_unit: 0
      blind: 0.3

    mapping:
      acc_cov: 0.1
      gyr_cov: 0.1
      b_acc_cov: 0.0001
      b_gyr_cov: 0.0001
      fov_degree: 360.0
      det_range: 40.0
      extrinsic_est_en: false
      extrinsic_T: [0.4287, 0.0, -0.19]
      extrinsic_R: [0.0, 0.0, 1.0,
                    0.0, -1.0, 0.0,
                    1.0, 0.0, 0.0]

    publish:
      path_en: false
      scan_publish_en: false
      dense_publish_en: false
      scan_bodyframe_pub_en: false

    pcd_save:
      pcd_save_en: false
      interval: -1
