ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.3
    two_d_mode: true
    predict_to_current_time: true
    transform_time_offset: 0.0
    transform_timeout: 0.3
    publish_tf: false
    publish_acceleration: false
    print_diagnostics: false
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: /odometry/gps
    odom0_config: [true, true, false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20
    odom0_nodelay: true

    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 50
    imu0_nodelay: true
    imu0_remove_gravitational_acceleration: true
